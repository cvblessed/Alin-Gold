<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - Alin Gold</title>
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <header><div class="container topbar"><a class="logo" href="index.html">ALIN GOLD</a><nav><a href="index.html">Home</a><a href="catalog.html">Catalog</a><a href="despre.html">Despre</a><a href="contact.html" aria-current="page">Contact</a><a href="cos.html">Cos</a></nav></div></header>
    <main class="container section contact-layout">
      <section class="card contact-info">
        <h1>Contact</h1>
        <p>Email: <a href="mailto:alingoldsrl@gmail.com">alingoldsrl@gmail.com</a></p>
        <p>Telefon: <a href="tel:060068707">0600 68 707</a></p>
        <p>Adresa showroom: Bd. Dacia 49/8, Chisinau, Moldova</p>
        <label for="work-schedule">Program de lucru</label>
        <select id="work-schedule" name="workSchedule" aria-label="Program de lucru Alin Gold">
          <option>Monday - 9:00 AM - 5:30 PM</option>
          <option>Tuesday - 9:00 AM - 6:00 PM</option>
          <option>Wednesday - 9:00 AM - 6:00 PM</option>
          <option>Thursday - 9:00 AM - 6:00 PM</option>
          <option>Friday - 9:00 AM - 6:00 PM</option>
          <option>Saturday - 9:00 AM - 1:30 PM</option>
          <option>Sunday - CLOSED</option>
        </select>
      </section>
      <section class="card">
        <h2>Trimite-ne un mesaj</h2>
        <form id="contact-form" class="form-card">
          <div class="form-grid">
            <label>Prenume
              <input type="text" name="firstName" required />
            </label>
            <label>Nume
              <input type="text" name="lastName" required />
            </label>
            <label>Email
              <input type="email" name="email" required />
            </label>
            <label>Telefon
              <input type="tel" name="phone" required />
            </label>
          </div>
          <label>Mesaj
            <textarea name="message" rows="4" required placeholder="Scrie aici intrebarea sau cererea ta"></textarea>
          </label>
          <p id="contact-form-message" class="form-error" aria-live="polite"></p>
          <button class="btn" type="submit">Trimite mesaj</button>
        </form>
      </section>
    </main>
    <footer><div class="container topbar"><small>© <span data-year></span> Alin Gold</small><nav><a href="termeni.html">Termeni</a><a href="confidentialitate.html">Confidentialitate</a><a href="retur.html">Retur</a></nav></div></footer>
    <script src="assets/js/main.js"></script>
  </body>
</html>
